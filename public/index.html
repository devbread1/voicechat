<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo — تواصل صوتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#07090f;
  --surface:#0c0f1a;
  --panel:#111626;
  --card:#161d30;
  --lift:#1c2540;
  --rim:rgba(255,255,255,0.06);
  --rim2:rgba(255,255,255,0.10);
  --blue:#4d7cfe;
  --blue-dim:rgba(77,124,254,0.18);
  --blue-glow:rgba(77,124,254,0.35);
  --cyan:#38d9f5;
  --cyan-dim:rgba(56,217,245,0.15);
  --green:#2ecc8a;
  --green-dim:rgba(46,204,138,0.2);
  --red:#f05c6e;
  --red-dim:rgba(240,92,110,0.18);
  --yellow:#f5c542;
  --t1:#edf0fa;
  --t2:#8892b0;
  --t3:#3d4a6b;
  --r:16px;
  --r-sm:10px;
  --r-xs:7px;
}

html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--ink);color:var(--t1);overflow:hidden}

/* ══════════════════════════════════
   BACKGROUND AMBIANCE
══════════════════════════════════ */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 20s ease-in-out infinite alternate}
.orb-1{width:600px;height:600px;background:var(--blue);top:-200px;right:-150px;animation-duration:25s}
.orb-2{width:500px;height:500px;background:#7c3aed;bottom:-200px;left:-100px;animation-duration:30s;animation-delay:-10s}
.orb-3{width:300px;height:300px;background:var(--cyan);top:40%;left:40%;animation-duration:20s;animation-delay:-5s;opacity:0.1}

@keyframes drift{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(40px,30px) scale(1.1)}
}

/* ══════════════════════════════════
   LOBBY
══════════════════════════════════ */
#lobby{
  position:relative;z-index:1;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}

.lobby-wrap{
  width:440px;
  animation:riseIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes riseIn{
  from{opacity:0;transform:translateY(32px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.lobby-glass{
  background:linear-gradient(145deg,rgba(22,29,48,0.9),rgba(17,22,38,0.95));
  border:1px solid var(--rim2);
  border-radius:28px;
  padding:52px 44px 44px;
  backdrop-filter:blur(32px);
  box-shadow:0 40px 100px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.03) inset,0 1px 0 rgba(255,255,255,0.08) inset;
  position:relative;overflow:hidden;
}

.lobby-glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(77,124,254,0.5),rgba(56,217,245,0.3),transparent);
}

.brand{display:flex;align-items:center;gap:14px;margin-bottom:10px;justify-content:center}

.brand-mark{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#4d7cfe,#38d9f5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(77,124,254,0.4),0 0 0 1px rgba(255,255,255,0.1) inset;
  position:relative;
}

.brand-mark::after{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
}

.brand-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#edf0fa 30%,#8892b0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

.brand-tagline{text-align:center;font-size:14px;color:var(--t2);margin-bottom:36px;font-weight:300;line-height:1.7}

.field{margin-bottom:16px}
.field-label{
  font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}

.input-wrap{position:relative}
.input-icon{
  position:absolute;top:50%;transform:translateY(-50%);
  right:14px;color:var(--t3);pointer-events:none;
  display:flex;align-items:center;
}

.field input{
  width:100%;padding:13px 42px 13px 16px;
  background:rgba(7,9,15,0.6);
  border:1px solid var(--rim);border-radius:var(--r-sm);
  color:var(--t1);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:400;
  outline:none;transition:all 0.25s;direction:rtl;
}
.field input:focus{
  border-color:rgba(77,124,254,0.5);
  background:rgba(7,9,15,0.8);
  box-shadow:0 0 0 3px rgba(77,124,254,0.12);
}
.field input::placeholder{color:var(--t3)}

.sep{display:flex;align-items:center;gap:10px;margin:22px 0;color:var(--t3);font-size:12px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--rim)}

.btn{
  width:100%;padding:14px 20px;border:none;border-radius:var(--r-sm);
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.22s;display:flex;align-items:center;justify-content:center;gap:9px;
  letter-spacing:0.2px;
}

.btn-primary{
  background:linear-gradient(135deg,#4d7cfe,#38d9f5);
  color:white;
  box-shadow:0 4px 24px rgba(77,124,254,0.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(77,124,254,0.45)}
.btn-primary:active{transform:translateY(0)}

.btn-ghost{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--rim);color:var(--t2);
  margin-top:10px;
}
.btn-ghost:hover{background:var(--lift);border-color:var(--rim2);color:var(--t1)}

.room-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue-dim);border:1px solid rgba(77,124,254,0.25);
  border-radius:20px;padding:4px 12px 4px 8px;
  font-size:12px;color:var(--blue);margin-top:14px;
  cursor:pointer;transition:all 0.2s;
}
.room-pill:hover{background:rgba(77,124,254,0.25)}

/* ══════════════════════════════════
   APP LAYOUT
══════════════════════════════════ */
#app{display:none;height:100vh;position:relative;z-index:1}
.app-layout{display:flex;height:100%;gap:0}

/* ── LEFT SIDEBAR (users) ── */
.sidebar{
  width:72px;background:var(--surface);
  border-left:1px solid var(--rim);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:6px;
  transition:width 0.3s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;position:relative;z-index:10;
}

/* ── CENTER (voice) ── */
.center{
  flex:1;display:flex;flex-direction:column;
  background:var(--ink);
  min-width:0;
}

/* ── RIGHT PANEL (chat) ── */
.chat-rail{
  width:320px;background:var(--surface);
  border-right:1px solid var(--rim);
  display:flex;flex-direction:column;
}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar{
  height:58px;padding:0 24px;
  border-bottom:1px solid var(--rim);
  display:flex;align-items:center;gap:12px;
  background:rgba(12,15,26,0.85);backdrop-filter:blur(20px);
  flex-shrink:0;
}

.topbar-icon{color:var(--blue);display:flex}
.topbar-room{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.3px}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin:0 4px;animation:pulse 2s infinite}
.topbar-count{font-size:12px;color:var(--t2);margin-right:auto}

.copy-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--r-xs);
  background:var(--blue-dim);border:1px solid rgba(77,124,254,0.2);
  color:var(--blue);font-size:12px;font-family:'Tajawal',sans-serif;font-weight:600;
  cursor:pointer;transition:all 0.2s;
}
.copy-btn:hover{background:rgba(77,124,254,0.25)}

/* ══════════════════════════════════
   VOICE STAGE
══════════════════════════════════ */
.voice-stage{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;gap:24px;overflow:hidden;position:relative;
}

.stage-grid{
  display:flex;flex-wrap:wrap;gap:20px;
  align-items:center;justify-content:center;
  max-width:680px;
}

.voice-card{
  width:150px;
  background:var(--card);
  border:1px solid var(--rim);
  border-radius:22px;
  padding:28px 16px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;
  animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes cardIn{
  from{opacity:0;transform:scale(0.85) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.voice-card::before{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(160deg,rgba(255,255,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}

.voice-card.speaking{
  border-color:rgba(46,204,138,0.45);
  background:linear-gradient(160deg,rgba(46,204,138,0.06),var(--card));
  box-shadow:0 0 0 1px rgba(46,204,138,0.2),0 16px 48px rgba(46,204,138,0.12);
  transform:scale(1.03);
}

.v-avatar-wrap{position:relative;width:66px;height:66px}

.v-avatar{
  width:66px;height:66px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:white;font-family:'Syne',sans-serif;
  position:relative;z-index:1;
  box-shadow:0 4px 16px rgba(77,124,254,0.3);
}

.v-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:2px solid var(--green);
  opacity:0;transition:opacity 0.3s;
  box-shadow:0 0 16px rgba(46,204,138,0.5);
}

.voice-card.speaking .v-ring{
  opacity:1;
  animation:ring-pulse 0.8s ease-in-out infinite alternate;
}

@keyframes ring-pulse{
  from{transform:scale(0.95);opacity:0.7}
  to{transform:scale(1.05);opacity:1}
}

.v-sound{
  display:flex;align-items:center;gap:2.5px;height:18px;
}
.v-bar{
  width:3px;border-radius:3px;
  background:var(--blue);opacity:0.35;
  transition:height 0.15s ease,opacity 0.3s;
}
.voice-card.speaking .v-bar{opacity:1;background:var(--green)}

.v-name{font-size:13px;font-weight:600;color:var(--t1);text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-badge{font-size:10px;color:var(--t3);font-weight:400}

.v-mute-overlay{
  position:absolute;top:10px;left:10px;
  width:22px;height:22px;border-radius:50%;
  background:var(--red-dim);border:1px solid rgba(240,92,110,0.3);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.2s;
}
.voice-card.is-muted .v-mute-overlay{opacity:1}

/* Empty stage */
.stage-empty{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  color:var(--t3);text-align:center;
  animation:fadeIn 0.6s ease both;
}
.stage-empty-icon{
  width:80px;height:80px;border-radius:24px;
  background:var(--card);border:1px solid var(--rim);
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);margin-bottom:4px;
}
.stage-empty h3{font-size:16px;font-weight:700;color:var(--t2)}
.stage-empty p{font-size:13px;line-height:1.6}

/* ══════════════════════════════════
   BOTTOM CONTROLS
══════════════════════════════════ */
.controls-bar{
  height:76px;flex-shrink:0;
  padding:0 28px;
  border-top:1px solid var(--rim);
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:rgba(12,15,26,0.9);backdrop-filter:blur(20px);
}

.ctrl{
  width:48px;height:48px;border-radius:14px;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.22s;color:var(--t2);
  background:var(--card);border:1px solid var(--rim);
  position:relative;
}
.ctrl:hover{background:var(--lift);color:var(--t1);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.ctrl:active{transform:translateY(0)}

.ctrl.danger{background:var(--red-dim);border-color:rgba(240,92,110,0.3);color:var(--red)}
.ctrl.danger:hover{background:rgba(240,92,110,0.28);box-shadow:0 6px 20px rgba(240,92,110,0.2)}

.ctrl.muted{background:var(--red-dim);border-color:rgba(240,92,110,0.3);color:var(--red)}

.ctrl-label{font-size:10px;font-family:'Tajawal',sans-serif;color:var(--t3);text-align:center;margin-top:2px}

.ctrl-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}

/* Sidebar users */
.sidebar-logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px var(--blue-glow);
  margin-bottom:10px;flex-shrink:0;
}

.sidebar-divider{width:32px;height:1px;background:var(--rim);margin:6px 0}

.s-user{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:white;
  position:relative;cursor:default;transition:transform 0.2s;
  flex-shrink:0;
}
.s-user:hover{transform:scale(1.1)}

.s-status{
  position:absolute;bottom:0;right:0;
  width:11px;height:11px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);
  box-shadow:0 0 6px var(--green);
}
.s-status.muted{background:var(--red);box-shadow:0 0 6px var(--red)}

/* ══════════════════════════════════
   CHAT RAIL
══════════════════════════════════ */
.chat-head{
  height:58px;padding:0 18px;
  border-bottom:1px solid var(--rim);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.chat-head-title{font-size:14px;font-weight:700;color:var(--t1)}
.chat-head-sub{font-size:11px;color:var(--t3);margin-right:auto}

.msgs{
  flex:1;overflow-y:auto;padding:18px 16px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--lift) transparent;
}

.msg{animation:msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both}

@keyframes msgIn{
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}

.msg.mine{animation-name:msgInMe}
@keyframes msgInMe{
  from{opacity:0;transform:translateX(10px)}
  to{opacity:1;transform:translateX(0)}
}

.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg.mine .msg-row{flex-direction:row-reverse}

.msg-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:white;
}
.msg.mine .msg-av{background:linear-gradient(135deg,#7c3aed,var(--blue))}

.msg-body{max-width:200px}

.msg-bubble{
  padding:9px 13px;border-radius:16px 16px 4px 16px;
  background:var(--card);border:1px solid var(--rim);
  font-size:13px;color:var(--t1);line-height:1.55;
  word-break:break-word;
}
.msg.mine .msg-bubble{
  background:linear-gradient(135deg,rgba(77,124,254,0.2),rgba(56,217,245,0.12));
  border-color:rgba(77,124,254,0.25);
  border-radius:16px 16px 16px 4px;
}

.msg-meta{
  display:flex;align-items:center;gap:6px;margin-top:4px;
  padding:0 4px;
}
.msg.mine .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:11px;font-weight:600;color:var(--blue)}
.msg.mine .msg-name{color:var(--cyan)}
.msg-time{font-size:10px;color:var(--t3)}

.chat-input-wrap{
  padding:14px 16px;border-top:1px solid var(--rim);
  display:flex;align-items:center;gap:10px;
}

.chat-field{
  flex:1;padding:11px 16px;
  background:var(--card);border:1px solid var(--rim);
  border-radius:24px;color:var(--t1);
  font-family:'Tajawal',sans-serif;font-size:13px;
  outline:none;transition:all 0.22s;direction:rtl;
}
.chat-field:focus{border-color:rgba(77,124,254,0.4);box-shadow:0 0 0 3px rgba(77,124,254,0.08)}
.chat-field::placeholder{color:var(--t3)}

.send{
  width:40px;height:40px;border-radius:12px;border:none;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:white;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.22s;
  box-shadow:0 4px 12px var(--blue-glow);
}
.send:hover{transform:scale(1.08);box-shadow:0 6px 18px var(--blue-glow)}
.send:active{transform:scale(0.97)}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--panel);border:1px solid var(--rim2);
  border-radius:24px;padding:11px 22px;
  font-size:13px;font-weight:500;color:var(--t1);
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s,transform 0.3s;
  z-index:9999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hidden{display:none!important}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--lift);border-radius:4px}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- ═══════════════ LOBBY ═══════════════ -->
<div id="lobby">
  <div class="lobby-wrap">
    <div class="lobby-glass">
      <div class="brand">
        <div class="brand-mark">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M12 1C12 1 7 5 7 10.5C7 13.5376 9.46243 16 12.5 16C15.5376 16 18 13.5376 18 10.5C18 5 12 1 12 1Z" fill="white" opacity="0.9"/>
            <path d="M5 10C5 10 3 11 3 13.5C3 17.0899 6.13401 20 10 20H14C17.866 20 21 17.0899 21 13.5C21 11 19 10 19 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="20" x2="12" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="23" x2="15" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-name">Echo</div>
      </div>
      <p class="brand-tagline">تواصل صوتي فوري عالي الجودة<br>ادخل غرفة وابدأ الحديث فوراً</p>

      <div class="field">
        <div class="field-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
          اسمك
        </div>
        <div class="input-wrap">
          <input type="text" id="input-name" placeholder="ادخل اسمك" maxlength="20" autocomplete="off">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
          </span>
        </div>
      </div>

      <div class="field">
        <div class="field-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          كود الغرفة
        </div>
        <div class="input-wrap">
          <input type="text" id="input-room" placeholder="أدخل كود الغرفة" maxlength="30" autocomplete="off" style="direction:ltr;text-align:right">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
        </div>
      </div>

      <div class="sep">أو</div>

      <button class="btn btn-primary" onclick="joinRoom()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        انضم للغرفة
      </button>
      <button class="btn btn-ghost" onclick="createRoom()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        إنشاء غرفة جديدة
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <div class="app-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 1C12 1 7 5 7 10.5C7 13.5376 9.46243 16 12.5 16C15.5376 16 18 13.5376 18 10.5C18 5 12 1 12 1Z" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="sidebar-divider"></div>
      <div id="sidebar-users"></div>
    </div>

    <!-- Center -->
    <div class="center">
      <!-- Topbar -->
      <div class="topbar">
        <span class="topbar-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </span>
        <span class="topbar-room" id="topbar-room">الغرفة</span>
        <div class="topbar-dot"></div>
        <span class="topbar-count" id="topbar-count">0 عضو</span>
        <button class="copy-btn" onclick="copyRoomCode()" id="copy-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          نسخ الكود
        </button>
      </div>

      <!-- Voice Stage -->
      <div class="voice-stage">
        <div class="stage-grid" id="stage-grid">
          <div class="stage-empty" id="stage-empty">
            <div class="stage-empty-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
            <h3>الغرفة فارغة</h3>
            <p>شارك كود الغرفة مع أصدقائك<br>وابدأ المكالمة فوراً</p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <div class="ctrl-wrap">
          <button class="ctrl" id="mic-btn" onclick="toggleMute()">
            <svg id="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <span class="ctrl-label">ميكروفون</span>
        </div>

        <div class="ctrl-wrap">
          <button class="ctrl" id="spk-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <span class="ctrl-label">الصوت</span>
        </div>

        <div class="ctrl-wrap">
          <button class="ctrl danger" onclick="leaveRoom()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
          <span class="ctrl-label" style="color:var(--red)">مغادرة</span>
        </div>
      </div>
    </div>

    <!-- Chat Rail -->
    <div class="chat-rail">
      <div class="chat-head">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--blue)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="chat-head-title">الشات</span>
        <span class="chat-head-sub" id="chat-count">0 رسالة</span>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="chat-input-wrap">
        <input class="chat-field" id="chat-field" placeholder="اكتب رسالة..." onkeypress="handleKey(event)">
        <button class="send" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<div id="audios" style="display:none"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let socket, localStream;
let myName='', myRoom='', myId='';
let muted=false;
let peers={}, users={};
let msgCount=0;

const ICE={iceServers:[
  {urls:'stun:stun.relay.metered.ca:80'},
  {urls:'turn:global.relay.metered.ca:80',username:'9f533e17021dddaaecbc8422',credential:'WonO96L2Pts+eIi3'},
  {urls:'turn:global.relay.metered.ca:80?transport=tcp',username:'9f533e17021dddaaecbc8422',credential:'WonO96L2Pts+eIi3'},
  {urls:'turn:global.relay.metered.ca:443',username:'9f533e17021dddaaecbc8422',credential:'WonO96L2Pts+eIi3'},
  {urls:'turns:global.relay.metered.ca:443?transport=tcp',username:'9f533e17021dddaaecbc8422',credential:'WonO96L2Pts+eIi3'}
]};

// Wave animation bars
function animateWaveBars(){
  document.querySelectorAll('.voice-card:not(.speaking) .v-bar').forEach(b=>{
    b.style.height=(3+Math.random()*5)+'px';
  });
  document.querySelectorAll('.voice-card.speaking .v-bar').forEach(b=>{
    b.style.height=(4+Math.random()*14)+'px';
  });
  requestAnimationFrame(()=>setTimeout(animateWaveBars,120));
}
animateWaveBars();

// ══════════════════════════════════════════
// LOBBY
// ══════════════════════════════════════════
function createRoom(){
  const id='room-'+Math.random().toString(36).slice(2,9);
  document.getElementById('input-room').value=id;
  toast('✨ كود الغرفة جاهز — شاركه!');
}

async function joinRoom(){
  const name=document.getElementById('input-name').value.trim();
  const room=document.getElementById('input-room').value.trim();
  if(!name){toast('⚠️ أدخل اسمك');return}
  if(!room){toast('⚠️ أدخل كود الغرفة');return}
  myName=name; myRoom=room;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }catch(e){
    toast('❌ تعذر الوصول للميكروفون');return;
  }
  initSocket();
}

// ══════════════════════════════════════════
// SOCKET
// ══════════════════════════════════════════
function initSocket(){
  socket=io();
  socket.on('connect',()=>{
    myId=socket.id;
    socket.emit('join-room',{roomId:myRoom,userName:myName});
    showApp();
  });
  socket.on('room-state',({users:u})=>{
    users=u; renderAll();
    Object.keys(u).forEach(sid=>{if(sid!==myId)makePeer(sid,true)});
  });
  socket.on('user-joined',({socketId,userName,users:u})=>{
    users=u; renderAll();
    toast('👋 '+userName+' انضم');
  });
  socket.on('user-left',({socketId})=>{
    const n=users[socketId]?.name;
    delete users[socketId]; killPeer(socketId); renderAll();
    if(n)toast('👋 '+n+' غادر');
  });
  socket.on('user-muted',({socketId,muted:m})=>{
    if(users[socketId])users[socketId].muted=m; renderAll();
  });
  socket.on('offer',async({from,offer})=>{
    const pc=makePeer(from,false);
    await pc.setRemoteDescription(offer);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit('answer',{to:from,answer:ans});
  });
  socket.on('answer',async({from,answer})=>{
    const pc=peers[from];
    if(pc)await pc.setRemoteDescription(answer);
  });
  socket.on('ice-candidate',({from,candidate})=>{
    const pc=peers[from];
    if(pc&&candidate)pc.addIceCandidate(candidate).catch(()=>{});
  });
  socket.on('chat-message',({from,userName,message,time})=>{
    addMsg({from,userName,message,time});
  });
}

// ══════════════════════════════════════════
// WebRTC
// ══════════════════════════════════════════
function makePeer(sid,init){
  if(peers[sid])return peers[sid];
  const pc=new RTCPeerConnection(ICE);
  peers[sid]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{if(e.candidate)socket.emit('ice-candidate',{to:sid,candidate:e.candidate})};
  pc.ontrack=e=>{
    let a=document.getElementById('a-'+sid);
    if(!a){a=document.createElement('audio');a.id='a-'+sid;a.autoplay=true;document.getElementById('audios').appendChild(a);}
    a.srcObject=e.streams[0];
    detectVAD(sid,e.streams[0]);
  };
  pc.onconnectionstatechange=()=>{
    if(['disconnected','failed','closed'].includes(pc.connectionState))killPeer(sid);
  };
  if(init){
    pc.onnegotiationneeded=async()=>{
      try{
        const off=await pc.createOffer();
        await pc.setLocalDescription(off);
        socket.emit('offer',{to:sid,offer:pc.localDescription});
      }catch(e){}
    };
  }
  return pc;
}

function killPeer(sid){
  if(peers[sid]){peers[sid].close();delete peers[sid];}
  const a=document.getElementById('a-'+sid);if(a)a.remove();
  const c=document.getElementById('vc-'+sid);if(c)c.remove();
  const s=document.getElementById('su-'+sid);if(s)s.remove();
}

// Voice Activity
const actx=new(window.AudioContext||window.webkitAudioContext)();
function detectVAD(sid,stream){
  try{
    const src=actx.createMediaStreamSource(stream);
    const an=actx.createAnalyser();an.fftSize=256;
    src.connect(an);
    const d=new Uint8Array(an.frequencyBinCount);
    setInterval(()=>{
      an.getByteFrequencyData(d);
      const avg=d.reduce((a,b)=>a+b)/d.length;
      const sp=avg>8;
      const vc=document.getElementById('vc-'+sid);
      if(vc)vc.classList.toggle('speaking',sp);
    },100);
  }catch(e){}
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function showApp(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('topbar-room').textContent='#'+myRoom;

  // Add my card
  addVoiceCard(myId,myName,true);
  addSidebarUser(myId,myName,false);
}

function renderAll(){
  // Sidebar users
  document.getElementById('sidebar-users').innerHTML='';
  Object.entries(users).forEach(([sid,u])=>{
    addSidebarUser(sid,u.name,u.muted);
  });

  // Update/add voice cards
  Object.entries(users).forEach(([sid,u])=>{
    if(!document.getElementById('vc-'+sid))addVoiceCard(sid,u.name,sid===myId);
    const vc=document.getElementById('vc-'+sid);
    if(vc)vc.classList.toggle('is-muted',u.muted);
  });

  const count=Object.keys(users).length;
  document.getElementById('topbar-count').textContent=count+' عضو';

  const empty=document.getElementById('stage-empty');
  if(empty&&count>0)empty.remove();
}

function addVoiceCard(sid,name,isMe){
  if(document.getElementById('vc-'+sid))return;
  const grid=document.getElementById('stage-grid');
  const el=document.createElement('div');
  el.className='voice-card'+(isMe?'':'');
  el.id='vc-'+sid;
  el.innerHTML=`
    <div class="v-mute-overlay">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </div>
    <div class="v-avatar-wrap">
      <div class="v-avatar">${name[0].toUpperCase()}</div>
      <div class="v-ring"></div>
    </div>
    <div class="v-sound">
      ${[1,2,3,4,5].map(()=>`<div class="v-bar" style="height:${3+Math.random()*6}px"></div>`).join('')}
    </div>
    <div class="v-name">${esc(name)}${isMe?' 👑':''}</div>
    <div class="v-badge">${isMe?'أنت':'متصل'}</div>
  `;
  grid.appendChild(el);
}

function addSidebarUser(sid,name,isMuted){
  const wrap=document.getElementById('sidebar-users');
  const el=document.createElement('div');
  el.id='su-'+sid;
  el.className='s-user';
  el.title=name;
  el.innerHTML=`${name[0].toUpperCase()}<div class="s-status${isMuted?' muted':''}"></div>`;
  wrap.appendChild(el);
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
function toggleMute(){
  muted=!muted;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!muted);
  socket.emit('toggle-mute',{muted});
  const btn=document.getElementById('mic-btn');
  const icon=document.getElementById('mic-icon');
  btn.classList.toggle('muted',muted);
  if(muted){
    icon.innerHTML=`<line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`;
  }else{
    icon.innerHTML=`<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`;
  }
  toast(muted?'🔇 تم كتم الصوت':'🎙️ تم تفعيل الصوت');
}

function leaveRoom(){
  if(localStream)localStream.getTracks().forEach(t=>t.stop());
  Object.keys(peers).forEach(s=>killPeer(s));
  if(socket)socket.disconnect();
  location.reload();
}

function copyRoomCode(){
  navigator.clipboard.writeText(myRoom).then(()=>toast('✅ تم نسخ كود الغرفة: '+myRoom));
}

// ══════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════
function sendMsg(){
  const f=document.getElementById('chat-field');
  const m=f.value.trim();
  if(!m)return;
  socket.emit('chat-message',{roomId:myRoom,message:m});
  f.value='';
}
function handleKey(e){if(e.key==='Enter')sendMsg()}

function addMsg({from,userName,message,time}){
  msgCount++;
  document.getElementById('chat-count').textContent=msgCount+' رسالة';
  const isMe=from===myId;
  const el=document.createElement('div');
  el.className='msg'+(isMe?' mine':'');
  el.innerHTML=`
    <div class="msg-row">
      <div class="msg-av">${userName[0].toUpperCase()}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${esc(userName)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">${esc(message)}</div>
      </div>
    </div>
  `;
  const msgs=document.getElementById('msgs');
  msgs.appendChild(el);
  msgs.scrollTop=msgs.scrollHeight;
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
